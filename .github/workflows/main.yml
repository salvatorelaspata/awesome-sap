name: README to PDF
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
jobs:
  convert:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_dir: /
          output_dir: /pdfs
          images_dir: /img
          image_import: /img
          # Default is true, can set to false to only get PDF files
          build_html: true
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: pdfs

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: convert
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: ./artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/*
          body: |
            ## 📄 Awesome SAP Resources (PDF Version)
            
            This release contains the PDF version of the Awesome SAP resources list.
            
            ### Files included:
            - `README.pdf` - Complete SAP resources guide in PDF format
            
            Generated automatically from: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}